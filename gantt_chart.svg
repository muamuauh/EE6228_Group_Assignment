<svg xmlns="http://www.w3.org/2000/svg" width="920" height="615" viewBox="0 0 920 615" role="img" aria-labelledby="title desc" style="max-width:100%;height:auto;">
  <title id="title">Gantt chart of the optimal kitchen schedule</title>
  <desc id="desc">Optimal small restaurant kitchen schedule with makespan 31 minutes.</desc>
  <rect width="920" height="615" fill="#ffffff"/>
